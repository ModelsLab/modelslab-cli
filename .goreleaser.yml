version: 2

project_name: modelslab

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/modelslab
    binary: modelslab
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

scoops:
  - repository:
      owner: ModelsLab
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    homepage: https://modelslab.com/cli
    description: "ModelsLab CLI — AI generation and account management from the terminal"
    license: MIT

nfpms:
  - formats:
      - deb
      - rpm
    homepage: https://modelslab.com/cli
    description: "ModelsLab CLI — AI generation and account management from the terminal"
    maintainer: "ModelsLab <support@modelslab.com>"
    license: MIT
    bindir: /usr/bin
